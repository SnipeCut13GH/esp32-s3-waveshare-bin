name: Build ESP32 BIN

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      # ✅ FIX: Install Arduino_GFX manually
      - name: Install Arduino GFX manually
        run: |
          git clone https://github.com/moononournation/Arduino_GFX.git
          mkdir -p ~/Arduino/libraries
          mv Arduino_GFX ~/Arduino/libraries/

      # ✅ Compile for ESP32-S3 (16MB + PSRAM)
      - name: Compile
        run: |
          arduino-cli compile \
          --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=enabled \
          --output-dir build .

      # ✅ Upload BIN files
      - name: Upload BIN
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin
